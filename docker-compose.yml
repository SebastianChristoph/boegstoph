services:
  app:
    build: .
    container_name: family-hub
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.family-hub.rule=Host(`dashboard.sebastianchristoph.de`)"
      - "traefik.http.routers.family-hub.entrypoints=websecure"
      - "traefik.http.routers.family-hub.tls.certresolver=letsencrypt"
      - "traefik.http.services.family-hub.loadbalancer.server.port=3000"
      - "traefik.http.services.family-hub.loadbalancer.responseforwarding.flushinterval=1ms"

  db:
    image: postgres:16-alpine
    container_name: family-hub-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
    driver: bridge
  traefik-proxy:
    external: true
